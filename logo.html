    <title>OJAS Logo - Flawless Vector Electric Trace</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            /* High-end cinematic glow stack */
            filter: drop-shadow(0 0 8px rgba(0, 180, 255, 0.85)) 
                    drop-shadow(0 0 25px rgba(0, 90, 255, 0.45));
        }

        svg {
            width: 100%;
            height: auto;
        }

        /* Essential trace styles overriding flat fills to structural lines */
        .electric-trace {
            fill: none !important;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Layer 1: Persistent Structural Blueprint Outline */
        .ambient-wireframe {
            stroke: rgba(0, 150, 255, 0.12);
            stroke-width: 2.5px;
        }

        /* Layer 2: Fast Running Cyan Pulse Arcs */
        .plasma-pulse-fast {
            stroke: #00f0ff;
            stroke-width: 4px;
            stroke-dasharray: 250 1000;
            stroke-dashoffset: 2500;
            animation: movePlasma 2.8s linear infinite;
        }

        /* Layer 3: Reverse Complementary Deep Blue Trail */
        .plasma-pulse-reverse {
            stroke: #003bff;
            stroke-width: 3px;
            stroke-dasharray: 120 480;
            stroke-dashoffset: 0;
            animation: movePlasma 1.6s linear infinite reverse;
        }

        /* Layer 4: Searing High-Voltage White Core Filament */
        .filament-core {
            stroke: #ffffff;
            stroke-width: 1.2px;
            stroke-dasharray: 1800;
            stroke-dashoffset: 1800;
            animation: strikeCircuit 4.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
        }

        /* Circuit line lightning dynamics */
        @keyframes strikeCircuit {
            0% { stroke-dashoffset: 1800; }
            50% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -1800; }
        }

        @keyframes movePlasma {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
